<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's That Pokémon? - Guessing Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sky">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <header class="topbar">
    <h1 class="title">
      <span class="title-who">Who's That</span>
      <span class="title-pokemon">POKÉMON?</span>
    </h1>
    <div class="hud">
      <div class="hud-item score-box">
        <span class="hud-label">⭐ Score</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-item streak-box">
        <span class="hud-label">🔥 Streak</span>
        <span id="streak" class="hud-value">0</span>
      </div>
      <button id="music-toggle" class="icon-btn" title="Turn music on or off">🔇</button>
    </div>
  </header>

  <div class="difficulty-bar">
    <span class="difficulty-label">Choose your level:</span>
    <div class="difficulty-buttons" role="group" aria-label="Difficulty selector">
      <button id="diff-easy" class="diff-btn diff-easy active" type="button">
        🌱 Easy <small>Familiar Pokémon</small>
      </button>
      <button id="diff-hard" class="diff-btn diff-hard" type="button">
        🔥 Hard <small>Rare &amp; Legendary</small>
      </button>
    </div>
  </div>

  <main class="game-card">
    <div class="silhouette-stage">
      <div class="poke-platform"></div>
      <img id="poke-image" src="" alt="Mystery Pokémon silhouette" class="poke-image silhouette">
      <div id="sparkles" class="sparkles"></div>
    </div>

    <p id="message" class="message">Look at the shadow… who could it be?</p>

    <div id="options" class="options"></div>

    <button id="next-btn" class="next-btn" hidden>Next Pokémon ➜</button>
  </main>

  <footer class="footer">
    <p>Catch 'em all by guessing right! Made for young Pokémon Trainers 🌟</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
